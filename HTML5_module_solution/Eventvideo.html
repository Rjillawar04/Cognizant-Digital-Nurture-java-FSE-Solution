<!Doctype html>
<html>
    <head>
        <title>Video Invite with Media Events</title>
        <script>
            function videoready(){
                document.getElementByid("msg").innerHTML = 
                "Video ready to play"
            }

            window.onbeforeunload = function(){
                return "your form is unfinished.";
            };
        </script>
        <Style>
        body{
            text-align:center;
            font-family:Arial;
        }

        #msg{
            color:green;
            font-weight:bold;
        }
        </style>
    </head>
    <body>
        <h2  align="center">Evnet promo Video</h2>
        <video width="500" controls oncanplay="videoready()">

            <source src="event.mp4" type="video/mp4">

            Your browser does not support video
        </video>
        <br><br>

        <p id="msg"></p>
    </body>
</html>
