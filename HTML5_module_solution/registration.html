<!DOCTYPE>
<html>
    <head>
        <Title>Event Registartion Form</Title>
        <style>
            body{
                font-family : Arial, sans-serif;
            }

            form{
                width:400px;
                margin:auto;
                padding:20px;
                border:2px solid black;
                border-radius:10px;
                background-color:#e7bebe ;
            }

            input,select,textarea{
                width  : 100%;
                margin-top:5px;
                margin-bottom:15px;
                padding : 8px;
            }

            button{
                padding:10px;
            }
            output{
                color:green;
                font-weight:bold;
            }
        </style>
    </head>
    <body>
        <h2 align="center">Event Registration Form</h2>

        <form>
            <label>Name : </label>
            <input type="text" placeholder="Enter your name" required autofocus>

            <label>Email : </label>
            <input type="email" placeholder="Enter your email" required>

            <label>Event date : </label>
            <input type="date" required>

            <label>Event Type : </label>
            <select required>
                <option value="">Select Event</option>
                <option>Sports</option>
                <option>Cultural</option>
                <option>Workshop</option>
            </select>

            <label>Message :</label>
            <textarea placeholder="Enter your message" required></textarea>

            <button type="button" onclick="showmessage()">Submit</button>

            <output id="result"></output>
        </form>
    </body>

</html>
